<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>科研助手工作台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>科研助手工作台</h1>
          <p>从一个研究目标开始，沉淀上下文、假设、缺口和下一步工作单。</p>
        </div>
        <div class="runtime" aria-live="polite">
          <span id="serviceState">服务检测中</span>
        </div>
      </header>

      <section class="goal-panel" aria-labelledby="goalTitle">
        <div class="goal-heading">
          <div>
            <h2 id="goalTitle">研究目标</h2>
            <p>把要判断、要分析或要产出的科研问题写在这里。</p>
          </div>
          <span id="workbenchState" class="state-pill">等待目标</span>
        </div>
        <div class="goal-entry">
          <label for="goalInput" class="sr-only">研究目标</label>
          <textarea id="goalInput" rows="3" placeholder="例如：判断 5W 芯片贴在铝板上是否会超过 80°C，并给出下一步实验建议。"></textarea>
          <button id="intakeButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5h10M4 12h8M4 19h6" />
              <path d="m15 17 2 2 5-6" />
            </svg>
            开始理解
          </button>
        </div>
      </section>

      <div class="workbench-grid">
        <section class="workspace-column" aria-label="上下文和结果">
          <section class="panel context-panel" aria-labelledby="contextTitle">
            <div class="panel-heading">
              <h2 id="contextTitle">上下文 / 文件</h2>
              <span id="contextState">可选</span>
            </div>
            <div class="context-grid">
              <label for="contextNotes">
                上下文
                <textarea id="contextNotes" rows="5" placeholder="补充样品、实验条件、材料参数、约束、已有结论或需要避开的假设。"></textarea>
              </label>
              <label for="filePaths">
                文件线索
                <textarea id="filePaths" rows="5" placeholder="每行一个路径或文件名：数据表、图片、CAD、笔记、文献摘录等。"></textarea>
              </label>
            </div>
          </section>

          <section class="panel result-panel" aria-labelledby="resultTitle">
            <div class="panel-heading result-heading">
              <h2 id="resultTitle">结果</h2>
              <span id="resultState">尚未生成工作单</span>
            </div>
            <nav class="tabs" aria-label="结果视图">
              <button class="tab is-active" type="button" data-tab="summary">Summary</button>
              <button class="tab" type="button" data-tab="model">Model</button>
              <button class="tab" type="button" data-tab="results">Results</button>
              <button class="tab" type="button" data-tab="figures">Figures</button>
              <button class="tab" type="button" data-tab="validation">Validation</button>
              <button class="tab" type="button" data-tab="files">Files</button>
            </nav>
            <div id="tabContent" class="tab-content" aria-live="polite"></div>
          </section>
        </section>

        <aside class="inspector-column" aria-label="AI 理解">
          <section class="panel understanding-panel" aria-labelledby="understandingTitle">
            <div class="panel-heading">
              <h2 id="understandingTitle">AI 理解卡</h2>
              <span id="readinessBadge">待理解</span>
            </div>
            <div id="understandingSnapshot" class="understanding-snapshot"></div>
            <div id="slotFields" class="slot-fields"></div>
            <div class="slot-actions">
              <button id="updateSlotsButton" type="button" class="secondary">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 12a9 9 0 1 1-2.6-6.4" />
                  <path d="M21 3v6h-6" />
                </svg>
                更新理解
              </button>
              <button id="clearSlotsButton" type="button" class="ghost">清空槽位</button>
            </div>
          </section>
        </aside>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
